name: Build Release APK

on:
  push:
    branches: [ main ]

# Grant GITHUB_TOKEN permission to create releases and upload assets
permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Extract version name
        id: version
        run: |
          VERSION_NAME=$(grep 'VERSION_NAME' app/version.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep 'VERSION_CODE' app/version.properties | cut -d'=' -f2)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Built version: $VERSION_NAME (Code: $VERSION_CODE)"

      - name: Rename APK with version
        run: |
          cp app/build/outputs/apk/release/app-release.apk sms_forwarder_v${{ steps.version.outputs.version_name }}.apk

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: v${{ steps.version.outputs.version_name }}
          body: |
            ## 短信转发器 v${{ steps.version.outputs.version_name }}

            **版本号**: ${{ steps.version.outputs.version_name }}
            **构建编号**: ${{ steps.version.outputs.version_code }}
            **构建时间**: ${{ github.event.head_commit.timestamp }}
            **提交信息**: ${{ github.event.head_commit.message }}

            ---
            📦 下载下方 `sms_forwarder_v${{ steps.version.outputs.version_name }}.apk` 安装包即可使用。
          files: sms_forwarder_v${{ steps.version.outputs.version_name }}.apk
          make_latest: true
